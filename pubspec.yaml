name: yt_workspace
publish_to: none

environment:
  sdk: ^3.8.0

workspace:
  - packages/yt
  - packages/yt_cli
  - packages/yt_cli_js
  - packages/yt_js
  - packages/yt_mcp
  - packages/yt_mcp_js

dev_dependencies:
  melos: ^7.7.0

melos:
  name: yt_workspace
  packages:
    - packages/**
    - '!packages/**/example'

  command:
    bootstrap:
      runPubGetInParallel: false
      usePubspecOverrides: true

  scripts:
    lint:all:
      run: melos run analyze && melos run format-check
    dep:
      run: dart pub get
      exec:
        concurrency: 1
    build:
      run: dart run build_runner build --delete-conflicting-outputs
      packageFilters:
        fileExists: build.yaml
    meta:
      run: melos run _meta_internal --no-select
      description: Regenerate lib/meta.dart from pubspec.yaml for yt and yt_cli.
    _meta_internal:
      exec: dart \$MELOS_ROOT_PATH/tool/update_meta.dart
      packageFilters:
        scope:
          - yt
          - yt_cli
    homebrew:
      run: bash \$MELOS_ROOT_PATH/tool/homebrew_release.sh
      description: |
        Compute SHA256 of the GitHub Release tarball, update homebrew/yt.rb,
        and sync to homebrew-yt tap repo. Run AFTER pushing a yt_cli-v* tag
        and the homebrew-release workflow has finished.
    analyze:
      run: dart analyze --fatal-infos
      exec:
        concurrency: 1
    format:
      run: dart format .
      exec:
        concurrency: 1
    format-check:
      run: dart format --output=none --set-exit-if-changed .
      packageFilters:
        dirExists: test
        ignore:
          - yt_js
          - yt_mcp_js
    test:
      run: melos run _test_internal --no-select
      exec:
        concurrency: 1
    dartdoc:
      run: dart doc
      packageFilters:
        scope: yt
    _test_internal:
      exec: dart test
      packageFilters:
        dirExists: test
        ignore:
          - yt_js
          - yt_mcp_js
