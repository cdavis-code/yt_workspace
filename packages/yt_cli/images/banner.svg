<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="youtube-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dart-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0175C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B4AB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="terminal-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="google-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#EA4335;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#FBBC05;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34A853;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="1280" y2="640" stroke="#FF0000" stroke-width="1"/>
    <line x1="1280" y1="0" x2="0" y2="640" stroke="#FF0000" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#FF0000" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#FF0000" stroke-width="1"/>
  </g>

  <!-- Subtle decorative circles -->
  <circle cx="180" cy="160" r="130" fill="#FF0000" opacity="0.05"/>
  <circle cx="1100" cy="480" r="150" fill="#0175C2" opacity="0.04"/>
  <circle cx="1100" cy="160" r="100" fill="#00B4AB" opacity="0.03"/>
  <circle cx="180" cy="480" r="110" fill="#FF4444" opacity="0.03"/>

  <!-- Terminal window with prompt -->
  <g transform="translate(440, 50)" filter="url(#glow)">
    <!-- Terminal frame -->
    <rect x="0" y="0" width="400" height="180" rx="12" fill="url(#terminal-bg)" stroke="url(#youtube-red)" stroke-width="2"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="400" height="28" rx="12" fill="#1a0a0a"/>
    <rect x="0" y="14" width="400" height="14" fill="#1a0a0a"/>
    <!-- Window dots -->
    <circle cx="18" cy="14" r="5" fill="#FF5F56"/>
    <circle cx="36" cy="14" r="5" fill="#FFBD2E"/>
    <circle cx="54" cy="14" r="5" fill="#27C93F"/>
    <!-- Title text -->
    <text x="200" y="19" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#888" text-anchor="middle">yt_cli — bash</text>
    <!-- Prompt line 1 -->
    <text x="20" y="60" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="14" fill="#27C93F">$</text>
    <text x="38" y="60" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="14" fill="#FF4444">yt</text>
    <text x="60" y="60" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="14" fill="#e0e0e0">search list --q </text>
    <text x="208" y="60" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="14" fill="#FBBC05">"flutter"</text>
    <!-- Output line -->
    <text x="20" y="86" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#888">▶ Flutter Tutorial — 1.2M views</text>
    <text x="20" y="106" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#888">▶ Dart for Beginners — 850K views</text>
    <!-- Prompt line 2 -->
    <text x="20" y="138" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="14" fill="#27C93F">$</text>
    <text x="38" y="138" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="14" fill="#FF4444">yt</text>
    <text x="60" y="138" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="14" fill="#e0e0e0">videos insert</text>
    <!-- Cursor -->
    <rect x="180" y="126" width="9" height="16" fill="#FF4444">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- CLI tag mini badge -->
  <g transform="translate(615, 240)">
    <rect x="0" y="0" width="50" height="24" rx="12" fill="#FF0000"/>
    <text x="25" y="17" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">CLI</text>
  </g>

  <!-- Connection nodes -->
  <g opacity="0.4">
    <circle cx="200" cy="180" r="6" fill="#FF0000"/>
    <circle cx="1080" cy="180" r="6" fill="#0175C2"/>
    <circle cx="200" cy="460" r="6" fill="#00B4AB"/>
    <circle cx="1080" cy="460" r="6" fill="#FF4444"/>
    <line x1="200" y1="180" x2="440" y2="140" stroke="#FF0000" stroke-width="1.5" opacity="0.3"/>
    <line x1="1080" y1="180" x2="840" y2="140" stroke="#0175C2" stroke-width="1.5" opacity="0.3"/>
    <line x1="200" y1="460" x2="440" y2="300" stroke="#00B4AB" stroke-width="1.5" opacity="0.3"/>
    <line x1="1080" y1="460" x2="840" y2="300" stroke="#FF4444" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="640" y="370" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="80" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow-strong)">
    yt_cli
  </text>

  <!-- Subtitle -->
  <text x="640" y="420" font-family="Arial, sans-serif" font-size="26" fill="#FF4444" text-anchor="middle">
    Command-Line Tool for YouTube APIs
  </text>

  <!-- Description -->
  <text x="640" y="458" font-family="Arial, sans-serif" font-size="18" fill="#aab0b6" text-anchor="middle">
    Data API · Live Streaming · Analytics · OAuth 2.0
  </text>

  <!-- pub.dev badge -->
  <g transform="translate(440, 492)">
    <rect x="0" y="0" width="68" height="30" rx="15" fill="#0175C2"/>
    <text x="34" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">pub.dev</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(520, 492)">
    <rect x="0" y="0" width="80" height="30" rx="15" fill="#0d0d0d" stroke="#FF0000" stroke-width="1.5"/>
    <text x="40" y="20" font-family="Arial, sans-serif" font-size="14" fill="#FF4444" text-anchor="middle">v3.0.2</text>
  </g>

  <!-- Homebrew badge -->
  <g transform="translate(612, 492)">
    <rect x="0" y="0" width="92" height="30" rx="15" fill="#FBB040"/>
    <text x="46" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0d0d0d" text-anchor="middle">🍺 brew</text>
  </g>

  <!-- SDK badge -->
  <g transform="translate(716, 492)">
    <rect x="0" y="0" width="92" height="30" rx="15" fill="#1a0a0a" stroke="#00B4AB" stroke-width="1"/>
    <text x="46" y="20" font-family="Arial, sans-serif" font-size="13" fill="#00B4AB" text-anchor="middle">SDK ^3.8.0</text>
  </g>

  <!-- Cross-platform badge -->
  <g transform="translate(820, 492)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="#0d0d0d" stroke="#34A853" stroke-width="1"/>
    <text x="60" y="20" font-family="Arial, sans-serif" font-size="13" fill="#34A853" text-anchor="middle">macOS·Linux·Win</text>
  </g>

  <!-- Feature icons at bottom -->
  <g opacity="0.75">
    <text x="120" y="565" font-family="Arial, sans-serif" font-size="15" fill="#FF0000" text-anchor="middle">▶️ videos</text>
    <text x="320" y="565" font-family="Arial, sans-serif" font-size="15" fill="#0175C2" text-anchor="middle">📋 playlists</text>
    <text x="520" y="565" font-family="Arial, sans-serif" font-size="15" fill="#EA4335" text-anchor="middle">📡 broadcast</text>
    <text x="720" y="565" font-family="Arial, sans-serif" font-size="15" fill="#00B4AB" text-anchor="middle">📊 analytics</text>
    <text x="920" y="565" font-family="Arial, sans-serif" font-size="15" fill="#FBBC05" text-anchor="middle">🔍 search</text>
    <text x="1120" y="565" font-family="Arial, sans-serif" font-size="15" fill="#4285F4" text-anchor="middle">🔑 authorize</text>
  </g>
</svg>
