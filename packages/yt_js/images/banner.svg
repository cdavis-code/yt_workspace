<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1a2b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="youtube-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="js-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7DF1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8C800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ts-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3178C6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#235A9E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="node-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#339933;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D882D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="1280" y2="640" stroke="#3178C6" stroke-width="1"/>
    <line x1="1280" y1="0" x2="0" y2="640" stroke="#3178C6" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#F7DF1E" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#F7DF1E" stroke-width="1"/>
  </g>

  <!-- Subtle decorative circles -->
  <circle cx="180" cy="160" r="130" fill="#F7DF1E" opacity="0.04"/>
  <circle cx="1100" cy="480" r="150" fill="#3178C6" opacity="0.04"/>
  <circle cx="1100" cy="160" r="100" fill="#FF0000" opacity="0.03"/>
  <circle cx="180" cy="480" r="110" fill="#339933" opacity="0.03"/>

  <!-- YouTube play button icon -->
  <g transform="translate(490, 50)" filter="url(#glow)">
    <!-- Rounded rectangle (YouTube pill shape) -->
    <rect x="10" y="30" width="150" height="105" rx="24" fill="none" stroke="url(#youtube-red)" stroke-width="3"/>
    <!-- Play triangle -->
    <polygon points="66,48 66,117 126,82" fill="url(#youtube-red)" opacity="0.85"/>
    <!-- Inner glow ring -->
    <rect x="10" y="30" width="150" height="105" rx="24" fill="none" stroke="#FF0000" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- JS badge -->
  <g transform="translate(660, 68)">
    <rect x="0" y="0" width="44" height="44" rx="6" fill="#F7DF1E"/>
    <text x="22" y="34" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="22" font-weight="bold" fill="#000" text-anchor="middle">JS</text>
  </g>

  <!-- TS badge -->
  <g transform="translate(714, 68)">
    <rect x="0" y="0" width="44" height="44" rx="6" fill="#3178C6"/>
    <text x="22" y="34" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">TS</text>
  </g>

  <!-- Curly braces decoration -->
  <g opacity="0.12">
    <text x="100" y="360" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="180" fill="#F7DF1E">{</text>
    <text x="1080" y="360" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="180" fill="#3178C6">}</text>
  </g>

  <!-- Connection nodes -->
  <g opacity="0.4">
    <circle cx="200" cy="180" r="6" fill="#F7DF1E"/>
    <circle cx="1080" cy="180" r="6" fill="#3178C6"/>
    <circle cx="200" cy="460" r="6" fill="#339933"/>
    <circle cx="1080" cy="460" r="6" fill="#FF0000"/>
    <line x1="200" y1="180" x2="490" y2="150" stroke="#F7DF1E" stroke-width="1.5" opacity="0.3"/>
    <line x1="1080" y1="180" x2="758" y2="150" stroke="#3178C6" stroke-width="1.5" opacity="0.3"/>
    <line x1="200" y1="460" x2="490" y2="290" stroke="#339933" stroke-width="1.5" opacity="0.3"/>
    <line x1="1080" y1="460" x2="758" y2="290" stroke="#FF0000" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Package name -->
  <text x="640" y="290" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="72" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow-strong)">
    @unngh/yt-js
  </text>

  <!-- Subtitle -->
  <text x="640" y="345" font-family="Arial, sans-serif" font-size="26" fill="#F7DF1E" text-anchor="middle">
    YouTube APIs for JavaScript &amp; TypeScript
  </text>

  <!-- Description -->
  <text x="640" y="390" font-family="Arial, sans-serif" font-size="18" fill="#aab0b6" text-anchor="middle">
    YouTube Data API · Live Streaming API · Analytics API · Browser &amp; Node.js
  </text>

  <!-- npm badge -->
  <g transform="translate(430, 425)">
    <rect x="0" y="0" width="60" height="30" rx="15" fill="#CB3837"/>
    <text x="30" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">npm</text>
  </g>

  <!-- ESM badge -->
  <g transform="translate(502, 425)">
    <rect x="0" y="0" width="58" height="30" rx="15" fill="#0d0d0d" stroke="#F7DF1E" stroke-width="1.5"/>
    <text x="29" y="20" font-family="Arial, sans-serif" font-size="13" fill="#F7DF1E" text-anchor="middle">ESM</text>
  </g>

  <!-- CJS badge -->
  <g transform="translate(572, 425)">
    <rect x="0" y="0" width="56" height="30" rx="15" fill="#0d0d0d" stroke="#F7DF1E" stroke-width="1.5"/>
    <text x="28" y="20" font-family="Arial, sans-serif" font-size="13" fill="#F7DF1E" text-anchor="middle">CJS</text>
  </g>

  <!-- TypeScript badge -->
  <g transform="translate(640, 425)">
    <rect x="0" y="0" width="92" height="30" rx="15" fill="#3178C6"/>
    <text x="46" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">TypeScript</text>
  </g>

  <!-- Node.js badge -->
  <g transform="translate(744, 425)">
    <rect x="0" y="0" width="80" height="30" rx="15" fill="#339933"/>
    <text x="40" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Node.js</text>
  </g>

  <!-- Feature icons at bottom -->
  <g opacity="0.75">
    <text x="120" y="540" font-family="Arial, sans-serif" font-size="15" fill="#FF0000" text-anchor="middle">▶️ Videos</text>
    <text x="320" y="540" font-family="Arial, sans-serif" font-size="15" fill="#3178C6" text-anchor="middle">📋 Playlists</text>
    <text x="520" y="540" font-family="Arial, sans-serif" font-size="15" fill="#EA4335" text-anchor="middle">📡 Live Streams</text>
    <text x="720" y="540" font-family="Arial, sans-serif" font-size="15" fill="#339933" text-anchor="middle">💬 Live Chat</text>
    <text x="920" y="540" font-family="Arial, sans-serif" font-size="15" fill="#FBBC05" text-anchor="middle">🔍 Search</text>
    <text x="1120" y="540" font-family="Arial, sans-serif" font-size="15" fill="#F7DF1E" text-anchor="middle">📊 Analytics</text>
  </g>

  <!-- Bottom accent line -->
  <g opacity="0.15">
    <line x1="200" y1="580" x2="1080" y2="580" stroke="#3178C6" stroke-width="1"/>
    <line x1="200" y1="583" x2="1080" y2="583" stroke="#F7DF1E" stroke-width="0.5"/>
  </g>
</svg>
