<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a2b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="youtube-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mcp-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="google-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#EA4335;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#FBBC05;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34A853;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="1280" y2="640" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="1280" y1="0" x2="0" y2="640" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#8B5CF6" stroke-width="1"/>
  </g>

  <!-- Subtle decorative circles -->
  <circle cx="180" cy="160" r="130" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="1100" cy="480" r="150" fill="#6366F1" opacity="0.04"/>
  <circle cx="1100" cy="160" r="100" fill="#FF0000" opacity="0.03"/>
  <circle cx="180" cy="480" r="110" fill="#4285F4" opacity="0.03"/>

  <!-- YouTube play button icon -->
  <g transform="translate(490, 60)" filter="url(#glow)">
    <!-- Rounded rectangle (YouTube pill shape) -->
    <rect x="10" y="30" width="180" height="126" rx="28" fill="none" stroke="url(#youtube-red)" stroke-width="3"/>
    <!-- Play triangle -->
    <polygon points="78,52 78,134 148,93" fill="url(#youtube-red)" opacity="0.85"/>
    <!-- Inner glow ring -->
    <rect x="10" y="30" width="180" height="126" rx="28" fill="none" stroke="#FF0000" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- MCP connection icon -->
  <g transform="translate(700, 75)" filter="url(#glow)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="url(#mcp-purple)" stroke-width="2"/>
    <circle cx="20" cy="20" r="6" fill="url(#mcp-purple)"/>
    <line x1="20" y1="2" x2="20" y2="-10" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="20" cy="-10" r="3" fill="#8B5CF6"/>
    <line x1="20" y1="38" x2="20" y2="50" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="20" cy="50" r="3" fill="#8B5CF6"/>
    <line x1="2" y1="20" x2="-10" y2="20" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="-10" cy="20" r="3" fill="#8B5CF6"/>
    <line x1="38" y1="20" x2="50" y2="20" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="50" cy="20" r="3" fill="#8B5CF6"/>
  </g>

  <!-- MCP badge -->
  <g transform="translate(710, 135)">
    <rect x="0" y="0" width="50" height="24" rx="12" fill="#8B5CF6"/>
    <text x="25" y="17" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">MCP</text>
  </g>

  <!-- Connection nodes -->
  <g opacity="0.4">
    <circle cx="200" cy="180" r="6" fill="#8B5CF6"/>
    <circle cx="1080" cy="180" r="6" fill="#FF0000"/>
    <circle cx="200" cy="460" r="6" fill="#4285F4"/>
    <circle cx="1080" cy="460" r="6" fill="#6366F1"/>
    <line x1="200" y1="180" x2="490" y2="160" stroke="#8B5CF6" stroke-width="1.5" opacity="0.3"/>
    <line x1="1080" y1="180" x2="700" y2="160" stroke="#FF0000" stroke-width="1.5" opacity="0.3"/>
    <line x1="200" y1="460" x2="490" y2="300" stroke="#4285F4" stroke-width="1.5" opacity="0.3"/>
    <line x1="1080" y1="460" x2="700" y2="300" stroke="#6366F1" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="640" y="370" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="72" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow-strong)">
    yt_mcp
  </text>

  <!-- Subtitle -->
  <text x="640" y="420" font-family="Arial, sans-serif" font-size="26" fill="#8B5CF6" text-anchor="middle">
    MCP Server for YouTube APIs
  </text>

  <!-- Description -->
  <text x="640" y="458" font-family="Arial, sans-serif" font-size="18" fill="#aab0b6" text-anchor="middle">
    AI-Ready YouTube Tools · 90+ MCP Tools · 26 API Services · Full CRUD
  </text>

  <!-- pub.dev badge -->
  <g transform="translate(466, 492)">
    <rect x="0" y="0" width="68" height="30" rx="15" fill="#0175C2"/>
    <text x="34" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">pub.dev</text>
  </g>

  <!-- MCP badge -->
  <g transform="translate(546, 492)">
    <rect x="0" y="0" width="58" height="30" rx="15" fill="#8B5CF6"/>
    <text x="29" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">MCP</text>
  </g>

  <!-- Dart badge -->
  <g transform="translate(616, 492)">
    <rect x="0" y="0" width="58" height="30" rx="15" fill="#0175C2"/>
    <text x="29" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Dart</text>
  </g>

  <!-- AI badge -->
  <g transform="translate(686, 492)">
    <rect x="0" y="0" width="92" height="30" rx="15" fill="#0a0a1a" stroke="#8B5CF6" stroke-width="1"/>
    <text x="46" y="20" font-family="Arial, sans-serif" font-size="13" fill="#8B5CF6" text-anchor="middle">AI Ready</text>
  </g>

  <!-- Feature icons at bottom -->
  <g opacity="0.75">
    <text x="120" y="565" font-family="Arial, sans-serif" font-size="15" fill="#FF0000" text-anchor="middle">▶️ Videos</text>
    <text x="320" y="565" font-family="Arial, sans-serif" font-size="15" fill="#0175C2" text-anchor="middle">📋 Playlists</text>
    <text x="520" y="565" font-family="Arial, sans-serif" font-size="15" fill="#EA4335" text-anchor="middle">📡 Live Streams</text>
    <text x="720" y="565" font-family="Arial, sans-serif" font-size="15" fill="#8B5CF6" text-anchor="middle">🤖 90+ Tools</text>
    <text x="920" y="565" font-family="Arial, sans-serif" font-size="15" fill="#00B4AB" text-anchor="middle">🔍 Analytics</text>
    <text x="1120" y="565" font-family="Arial, sans-serif" font-size="15" fill="#4285F4" text-anchor="middle">🔑 OAuth 2.0</text>
  </g>
</svg>
