name: yt
version: 2.2.6+1
description: Native Dart interface to multiple YouTube REST APIs including the Data and Live Streaming API.
homepage: https://github.com/faithoflifedev/yt
repository: https://github.com/faithoflifedev/yt/tree/main/packages/yt
issue_tracker: https://github.com/faithoflifedev/yt/issues

topics:
  - api
  - youtube

resolution: workspace

environment:
  sdk: ^3.8.0

dependencies:
  csv: ^8.0.0
  dio: ^5.9.0
  fling_pickle: ^0.4.3
  googleapis_auth: ^2.0.0
  http: ^1.5.0
  http_parser: ^4.1.2
  json_annotation: ^4.9.0
  loggy: ^2.0.3
  retrofit: ^4.7.2
  universal_io: ^2.2.2
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.7.1
  json_serializable: ^6.9.5
  lints: ^6.0.0
  retrofit_generator: ^10.0.4
