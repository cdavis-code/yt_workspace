  dio: ^5.9.2
  http: ^1.6.0
  http_parser: ^4.1.2
  json_annotation: ^4.12.0
  loggy: ^2.0.3
  oauth2: ^2.0.5
  retrofit: ^4.9.2
  stemmer: ^3.2.0
  universal_io: ^2.3.1
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  lints: ^6.1.0
  retrofit_generator: ^10.2.6
