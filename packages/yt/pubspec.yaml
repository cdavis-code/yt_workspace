name: yt
version: 2.3.1
description: Native Dart interface to multiple YouTube REST APIs including the Data and Live Streaming API.
homepage: https://github.com/cdavis-code/yt
repository: https://github.com/cdavis-code/yt/tree/main/packages/yt
issue_tracker: https://github.com/cdavis-code/yt/issues

topics:
  - api
  - youtube
  - oauth2
  - rest
  - live-streaming

funding:
  - https://www.buymeacoffee.com/cdavis

resolution: workspace

environment:
  sdk: ^3.8.0

dependencies:
  csv: ^8.0.0
  dio: ^5.9.2
  fling_pickle: ^0.4.3
  googleapis_auth: ^2.3.1
  http: ^1.6.0
  http_parser: ^4.1.2
  json_annotation: ^4.11.0
  loggy: ^2.0.3
  retrofit: ^4.9.2
  stemmer: ^3.2.0
  universal_io: ^2.3.1
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.15.0
  json_serializable: ^6.13.2
  lints: ^6.1.0
  retrofit_generator: ^10.2.6
