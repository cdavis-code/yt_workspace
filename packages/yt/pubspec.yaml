homepage: https://github.com/cdavis-code/yt_workspace/tree/main/packages/yt
repository: https://github.com/cdavis-code/yt_workspace
issue_tracker: https://github.com/cdavis-code/yt_workspace/issues

topics:
  - api
  - youtube
  - oauth2
  - rest
  - live-streaming

funding:
  - https://www.buymeacoffee.com/cdavis

resolution: workspace

environment:
